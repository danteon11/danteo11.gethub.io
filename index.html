<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="description" content="VB Day Game — Virginia Beach Spring Break">
<meta name="theme-color" content="#080808">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VB Day 🌊">
<title>VB Day 🌊</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#080808;--bg1:#0f0f0f;--bg2:#161616;--bg3:#222;--txt:#f0f0f0;--txt2:#888;--txt3:#444;--green:#4ade80;--blue:#38bdf8;--purple:#a78bfa;--orange:#fb923c;--red:#f43f5e;--yellow:#fbbf24;--f:'Courier New',monospace}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:var(--f);overflow-x:hidden;overscroll-behavior:none}
#app{max-width:430px;margin:0 auto;min-height:100vh;position:relative}
.scr{display:none;min-height:100vh;padding-bottom:100px;animation:fadeIn .2s ease}
.scr.on{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}
@keyframes popIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes slideDown{from{transform:translateX(-50%) translateY(-14px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
@keyframes confettiFall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(90px) rotate(400deg);opacity:0}}
@keyframes eventPop{0%{transform:scale(.5) rotate(-6deg);opacity:0}60%{transform:scale(1.08) rotate(2deg);opacity:1}100%{transform:scale(1) rotate(0);opacity:1}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes glow{0%,100%{box-shadow:0 0 8px #f43f5e44}50%{box-shadow:0 0 18px #f43f5e88}}
@keyframes ptFloat{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-60px)}}
@keyframes ptSink{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(30px)}}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(200%)}}
@keyframes wheel{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}
@keyframes timerBlink{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes navPulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes slideUp{from{transform:translateX(-50%) translateY(20px);opacity:0}to{transform:translateX(-50%) translateY(0);opacity:1}}
@keyframes awardReveal{0%{transform:scale(0.7) translateY(20px);opacity:0}70%{transform:scale(1.05) translateY(-3px);opacity:1}100%{transform:scale(1) translateY(0);opacity:1}}
#bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--bg1);border-top:1px solid var(--bg3);display:none;z-index:50}
#score-strip{position:fixed;bottom:57px;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--bg);border-top:1px solid var(--bg3);display:none;z-index:49;padding:5px 10px 4px}
.nb{flex:1;padding:11px 4px 18px;background:none;border:none;color:var(--txt3);font-family:var(--f);font-size:10px;letter-spacing:.5px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .15s;position:relative}
.nb .ic{font-size:20px}
.nb.on{color:var(--txt)}
.nb-badge{position:absolute;top:8px;right:calc(50% - 18px);width:8px;height:8px;background:#38bdf8;border-radius:50%;border:1px solid var(--bg1);animation:navPulse .8s ease-in-out infinite;display:none}
.nb-badge.show{display:block}
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;overflow-y:auto}
.ovl.off{display:none}
.ovl-inner{width:100%;max-width:360px;animation:popIn .25s ease}
.btn{width:100%;padding:14px;background:var(--txt);color:var(--bg);border:none;border-radius:12px;font-family:var(--f);font-size:14px;font-weight:900;cursor:pointer;letter-spacing:1px;transition:opacity .1s}
.btn:active{opacity:.8}
.btn-ghost{background:none;border:none;color:var(--txt3);font-family:var(--f);font-size:12px;cursor:pointer;text-decoration:underline}
.sync-dot{width:7px;height:7px;border-radius:50%;display:inline-block;background:#333;transition:background .4s;flex-shrink:0}
.input{background:var(--bg2);border:1px solid var(--bg3);border-radius:8px;padding:10px 12px;color:#fff;font-family:var(--f);font-size:14px;outline:none;width:100%}
#toast{position:fixed;top:18px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--bg3);border-radius:10px;padding:10px 18px;font-size:13px;font-weight:700;z-index:500;display:none;animation:slideDown .3s ease;max-width:88vw;text-align:center}
#toast.on{display:block}
.confetti-wrap{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;pointer-events:none;z-index:600;overflow:hidden;height:130px}
.confetti-piece{position:absolute;top:0;animation:confettiFall 1s ease-out forwards}
.pt-anim{position:fixed;font-family:var(--f);font-size:22px;font-weight:900;pointer-events:none;z-index:700;white-space:nowrap}
.streak-badge{display:inline-flex;align-items:center;gap:3px;background:#fb923c18;border:1px solid #fb923c44;border-radius:20px;padding:2px 8px;font-size:10px;color:#fb923c;font-weight:700}
.tied-badge{display:inline-flex;align-items:center;background:#38bdf818;border:1px solid #38bdf844;border-radius:20px;padding:2px 8px;font-size:10px;color:#38bdf8;font-weight:700}
.event-card{animation:eventPop .4s cubic-bezier(.34,1.56,.64,1) forwards}
.mvp-badge{display:inline-flex;align-items:center;gap:4px;background:#fbbf2415;border:1px solid #fbbf2444;border-radius:20px;padding:3px 10px;font-size:11px;color:#fbbf24;font-weight:700}
.you-badge{background:#38bdf820;border:1px solid #38bdf844;border-radius:10px;padding:1px 5px;font-size:9px;color:#38bdf8;font-weight:700;margin-left:3px}
.comeback-banner{background:linear-gradient(135deg,#f43f5e15,#fb923c15);border:1px solid #f43f5e55;border-radius:10px;padding:10px 14px;font-size:12px;color:#fb923c;animation:glow 2s ease-in-out infinite;margin-bottom:4px}
.mode-btn{flex:1;padding:14px 8px;background:var(--bg2);border:2px solid var(--bg3);border-radius:12px;color:var(--txt2);font-family:var(--f);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;text-align:center;line-height:1.5}
.mode-btn.active{border-color:var(--blue);color:var(--blue);background:#38bdf808}
.prog-bar-wrap{background:var(--bg3);border-radius:3px;height:6px;overflow:hidden;position:relative}
.prog-bar-fill{height:100%;border-radius:3px;transition:width .4s ease;position:relative;overflow:hidden}
.prog-bar-fill::after{content:'';position:absolute;top:0;left:0;width:40%;height:100%;background:rgba(255,255,255,.25);animation:shimmer 1.5s ease-in-out infinite}
.ct-bar{height:4px;background:var(--bg3);border-radius:2px;overflow:hidden;margin-bottom:8px}
.ct-fill{height:100%;border-radius:2px;transition:width .95s linear}
.loc-card{background:var(--bg1);border-radius:12px;overflow:hidden}
.loc-header{padding:13px 16px;display:flex;align-items:center;gap:10px}
.loc-footer{padding:11px 14px;display:flex;align-items:center;gap:10px}
.ct-dot{width:6px;height:6px;border-radius:50%;background:#fbbf24;display:inline-block;animation:timerBlink .8s infinite;margin-right:4px}
.push-btn{position:fixed;bottom:138px;right:14px;background:#38bdf8;color:#000;border:none;border-radius:50px;padding:8px 14px;font-family:var(--f);font-size:11px;font-weight:700;cursor:pointer;z-index:60;display:none;box-shadow:0 2px 12px #38bdf844;animation:bounce .9s ease-in-out infinite}
#ev-bar{position:fixed;bottom:108px;left:50%;transform:translateX(-50%);width:calc(100% - 28px);max-width:402px;background:var(--bg1);border:1px solid #fbbf2455;border-radius:10px;padding:8px 12px;display:none;align-items:center;gap:8px;z-index:55;animation:slideUp .3s ease}
.tut-row{display:flex;align-items:flex-start;gap:12px;padding:9px 0;border-bottom:1px solid var(--bg3)}
.tut-row:last-child{border-bottom:none}
.tut-icon{font-size:18px;flex-shrink:0;margin-top:2px}
.end-card{background:var(--bg1);border-radius:14px;padding:16px;margin-bottom:12px;border:1px solid var(--bg3);animation:awardReveal .5s ease forwards}
.stat-pill{display:inline-flex;align-items:center;gap:4px;background:var(--bg2);border:1px solid var(--bg3);border-radius:20px;padding:3px 10px;font-size:11px;color:var(--txt2)}
</style>
</head>
<body>
<div id="app">
  <div class="scr on" id="s-home"><div style="display:flex;align-items:center;justify-content:center;min-height:100vh;color:#444;font-family:Courier New,monospace;font-size:13px;flex-direction:column;gap:12px"><div style="font-size:40px">🌊</div><div>Loading VB Day...</div></div></div>
  <div class="scr" id="s-game">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:14px 18px 0">
      <button onclick="goHome()" style="background:none;border:none;color:var(--txt3);font-family:var(--f);font-size:12px;cursor:pointer">← home</button>
      <div style="display:flex;align-items:center;gap:7px">
        <button id="mute-btn" onclick="toggleMute()" style="background:none;border:1px solid var(--bg3);border-radius:6px;padding:3px 8px;color:var(--txt3);font-family:var(--f);font-size:14px;cursor:pointer">🔊</button>
        <span class="sync-dot" id="sd-game"></span>
        <span style="font-size:11px;color:var(--txt3)" class="sync-lbl">local</span>
        <button onclick="showSyncPanel()" style="background:none;border:1px solid var(--bg3);border-radius:6px;padding:3px 8px;color:var(--txt3);font-family:var(--f);font-size:10px;cursor:pointer">sync</button>
      </div>
    </div>
    <div id="stop-tabs" style="display:flex;justify-content:space-around;padding:10px 12px 0;border-bottom:1px solid var(--bg3)"></div>
    <div id="lead-banner" style="margin:10px 14px 0;padding:9px 14px;border-radius:10px;background:var(--bg1);border:1px solid var(--bg3);font-size:12px;color:var(--txt3);display:flex;align-items:center;gap:8px;flex-wrap:wrap"></div>
    <div id="event-banner" style="margin:6px 14px 0;display:none"></div>
    <div id="stop-content" style="padding:10px 14px;display:flex;flex-direction:column;gap:10px"></div>
  </div>
  <div class="scr" id="s-scores"></div>
  <div class="scr" id="s-budget"></div>
  <div class="scr" id="s-map"></div>
  <div class="scr" id="s-end"></div>

  <div class="ovl off" id="ovl-dare" onclick="if(event.target===this)this.classList.add('off')"><div class="ovl-inner" id="dare-inner"></div></div>
  <div class="ovl off" id="ovl-lvl" onclick="if(event.target===this)this.classList.add('off')"><div class="ovl-inner" id="lvl-inner"></div></div>
  <div class="ovl off" id="ovl-event" onclick="if(event.target===this)this.classList.add('off')"><div class="ovl-inner event-card" id="event-inner"></div></div>
  <div class="ovl off" id="ovl-vote" onclick="if(event.target===this)this.classList.add('off')"><div class="ovl-inner" id="vote-inner"></div></div>
  <div class="ovl off" id="ovl-secret" onclick="if(event.target===this)this.classList.add('off')"><div class="ovl-inner" id="secret-inner"></div></div>
  <div class="ovl off" id="ovl-nextstop" onclick="if(event.target===this)this.classList.add('off')"><div class="ovl-inner" id="nextstop-inner"></div></div>
  <div class="ovl off" id="ovl-sync" onclick="if(event.target===this)this.classList.add('off')"><div class="ovl-inner" id="sync-inner"></div></div>
  <div class="ovl off" id="ovl-chtimer" onclick="if(event.target===this)this.classList.add('off')"><div class="ovl-inner" id="chtimer-inner"></div></div>
  <div class="ovl off" id="ovl-tutorial"><div class="ovl-inner" id="tutorial-inner"></div></div>
  <div class="ovl off" id="ovl-reset"><div class="ovl-inner" id="reset-inner">
    <div style="font-size:36px;margin-bottom:12px">🔄</div>
    <div style="font-size:16px;font-weight:900;margin-bottom:8px">Start Over?</div>
    <div style="font-size:13px;color:var(--txt2);margin-bottom:24px;line-height:1.5">All scores, progress, dares and secrets will be wiped. This cannot be undone.</div>
    <button onclick="doReset()" style="width:100%;padding:14px;background:#f43f5e;color:#fff;border:none;border-radius:12px;font-family:var(--f);font-size:14px;font-weight:900;cursor:pointer;margin-bottom:10px">Yes, Start Over</button>
    <button onclick="document.getElementById('ovl-reset').classList.add('off')" class="btn-ghost">cancel</button>
  </div></div>
  <div class="ovl off" id="ovl-share" onclick="if(event.target===this)this.classList.add('off')"><div class="ovl-inner" id="share-inner"></div></div>

  <div id="ev-bar">
    <span class="ct-dot"></span>
    <span id="ev-bar-label" style="flex:1;font-size:12px;font-weight:700;color:var(--yellow)">Event timer</span>
    <button onclick="reopenEvOverlay()" style="background:var(--bg2);border:1px solid #fbbf2444;border-radius:6px;padding:4px 10px;color:var(--yellow);font-family:var(--f);font-size:10px;font-weight:700;cursor:pointer">view ↑</button>
    <button onclick="document.getElementById('ev-bar').style.display='none'" style="background:none;border:none;color:var(--txt3);font-family:var(--f);font-size:18px;cursor:pointer;line-height:1">×</button>
  </div>

  <div id="score-strip"></div>
  <nav id="bnav" style="display:none;flex-direction:row">
    <button class="nb" data-t="map" onclick="navTo('map')"><span class="ic">🗺️</span>Map<span class="nb-badge" id="badge-map"></span></button>
    <button class="nb on" data-t="game" onclick="navTo('game')"><span class="ic">🎮</span>Game<span class="nb-badge" id="badge-game"></span></button>
    <button class="nb" data-t="scores" onclick="navTo('scores')"><span class="ic">🏆</span>Scores<span class="nb-badge" id="badge-scores"></span></button>
    <button class="nb" data-t="budget" onclick="navTo('budget')"><span class="ic">💰</span>Budget<span class="nb-badge" id="badge-budget"></span></button>
  </nav>
  <button class="push-btn" id="push-btn" onclick="pushUpdate()">Share score update</button>
  <div id="toast"></div>
  <div class="confetti-wrap" id="confetti-wrap"></div>
</div>

<script>
'use strict';

/* ── DATA ──────────────────────────────────────────────────────── */
var LEVELS=[
  {min:0,  id:'rookie',  name:'Rookie',  icon:'🌱',color:'#4ade80',power:null},
  {min:6,  id:'regular', name:'Regular', icon:'🔥',color:'#38bdf8',power:'Dare Duel: Call out any player. Both spin a dare. Complete yours while they bail — steal 1 pt.'},
  {min:12, id:'vet',     name:'Vet',     icon:'⚡',color:'#a78bfa',power:'Double Down: Before any vote challenge, declare it out loud. Win = +1 bonus pt. Lose = nothing extra.'},
  {min:20, id:'legend',  name:'Legend',  icon:'👑',color:'#fbbf24',power:'Free Pass: Skip one dare with no penalty. Once per day.'},
];
var CAT={easy:'#4ade80',medium:'#fbbf24',hard:'#f43f5e'};
var MEDALS=['🥇','🥈','🥉'];
var CC=['#4ade80','#38bdf8','#a78bfa','#fbbf24','#f43f5e','#fb923c'];
var WHEEL=['🎲','🎯','🃏','🎰','🎲','🎯','🃏','🎰'];

var EVENTS=[
  {id:'e1',icon:'📱',title:'Phone Swap',desc:'Everyone passes their unlocked phone to the left for 3 minutes. The holder can send ONE text as you.',color:'#38bdf8',timer:180},
  {id:'e2',icon:'🤐',title:'Silent Treatment',desc:'No talking for 5 full minutes. First to speak loses 1 pt.',color:'#f43f5e',timer:300},
  {id:'e3',icon:'2️⃣',title:'Double Points',desc:'The very next challenge is worth DOUBLE points.',color:'#fbbf24'},
  {id:'e4',icon:'🔀',title:'Role Reversal',desc:'Last place picks the next dare target. The leader HAS to accept.',color:'#fb923c'},
  {id:'e5',icon:'🎭',title:'Character Mode',desc:'Everyone picks an accent right now and keeps it for 2 stops.',color:'#38bdf8'},
  {id:'e6',icon:'🤝',title:'Alliance',desc:'Last place and first place do the next dare TOGETHER. Both get credit.',color:'#a78bfa'},
  {id:'e7',icon:'🎙️',title:'Hot Mic',desc:'For 10 minutes, whoever talks loudest loses 1 pt. Whisper only.',color:'#a78bfa',timer:600},
];

var SECRETS=[
  {id:'s1',t:"Get someone to say 'what?' at least 3 times by being confusing on purpose.",pts:3,target:3},
  {id:'s2',t:"Use the phrase 'as a matter of fact' at least 4 times in real conversation.",pts:3,target:4},
  {id:'s3',t:'Convince someone to carry something for you at least once today.',pts:2,target:1},
  {id:'s4',t:"Start at least 3 sentences with 'technically speaking...'",pts:2,target:3},
  {id:'s5',t:"Make someone laugh while they're mid-sip of a drink.",pts:4,target:1},
  {id:'s6',t:"Use a word incorrectly on purpose and act like it's normal. Do it at least twice.",pts:3,target:2},
  {id:'s7',t:'Get someone else to hum or sing something without you prompting it.',pts:3,target:1},
  {id:'s8',t:'Successfully change the subject mid-conversation at least 3 times.',pts:2,target:3},
  {id:'s9',t:'Get a complete stranger to smile at you.',pts:2,target:1},
  {id:'s10',t:"Say 'I've actually been thinking about this a lot' before something completely unimportant.",pts:3,target:1},
];

var DARES=[
  {t:"Text someone 'we need to talk' and wait for a reply before you're off the hook.",c:'easy'},
  {t:"Change your lock screen to your most embarrassing photo for the rest of the day.",c:'easy'},
  {t:"Do a dramatic reading of the last text you sent.",c:'easy'},
  {t:"Respond to everything with 'interesting...' for the next 5 minutes.",c:'easy',s:300},
  {t:"Speak only in questions for the next 3 minutes.",c:'easy',s:180},
  {t:"Stare at the ceiling every time someone says your name for 5 minutes.",c:'easy',s:300},
  {t:"Send a text that just says 'ok' and act completely normal about it.",c:'easy'},
  {t:"Say 'as I was saying' before every sentence for the next 3 minutes.",c:'easy',s:180},
  {t:"Speak in third person for 3 minutes.",c:'medium',s:180},
  {t:"Walk in slow motion for 45 seconds.",c:'medium',s:45},
  {t:"Narrate everything you do out loud like a nature documentary for 2 minutes.",c:'medium',s:120},
  {t:"Spell out every word you say for 2 minutes.",c:'medium',s:120},
  {t:"Call someone, say 'it's time' seriously, and hang up immediately.",c:'medium'},
  {t:"Pretend you're on a very important call for 60 seconds. Walk around.",c:'medium',s:60},
  {t:"Mispronounce every single word in the next sentence you say.",c:'medium'},
  {t:"Reply to the next thing anyone says with a completely unrelated movie quote.",c:'medium'},
  {t:"Talk in slow motion for 90 seconds.",c:'medium',s:90},
  {t:"Pretend you dropped something invisible and look for it seriously for 30 seconds.",c:'medium',s:30},
  {t:"Send a voice memo to a random contact that just says 'you know what you did.'",c:'hard'},
  {t:"60-second impression of any movie character. Everyone guesses who.",c:'hard',s:60},
  {t:"Do a dramatic reading of the last thing you searched on your phone.",c:'hard'},
  {t:"Stand next to a random sign and stare at it like it's urgent for 30 seconds.",c:'hard',s:30},
  {t:"Walk past someone humming a song out loud. Do not acknowledge it.",c:'hard'},
  {t:"Read the next sign you see out loud in a full movie trailer voice.",c:'hard'},
  {t:"Tie your shoe with complete, theatrical drama for 20 full seconds.",c:'hard',s:20},
  {t:"For the next 5 minutes, end every sentence with 'but that's just me.'",c:'easy',s:300},
  {t:"Describe yourself in the third person to someone for 45 seconds like an interview.",c:'hard',s:45},
  {t:"Freestyle rap for 30 seconds about the last thing you ate.",c:'hard',s:30},
  {t:"Strike a power pose for 15 seconds in the most public spot nearby.",c:'medium',s:15},
  {t:"Write a 3-sentence Yelp review of the last bathroom you used. Read it aloud.",c:'medium'},
  {t:"Pretend your hand is a puppet and have a full conversation with it for 45 seconds.",c:'easy',s:45},
  {t:"Ask a stranger what time it is, gasp and say 'already?' and walk away fast.",c:'hard'},
  {t:"For the next 4 minutes, start every sentence with 'Plot twist:'",c:'medium',s:240},
  {t:"Do your best impression of a GPS giving directions for 30 seconds.",c:'medium',s:30},
];
var HARD=DARES.filter(function(d){return d.c==='hard';});

var STOPS=[
  {id:'trashmore',name:'Mount Trashmore',emoji:'⛰️',color:'#4ade80',time:'9:00am',chs:[
    {id:'t1',n:'Hill Race',    p:3,t:'winner',d:"First to the top of the hill. No rules, just win."},
    {id:'t2',n:'Worst Selfie', p:2,t:'vote',  d:"Everyone takes their ugliest selfie on their own phone and shows the group. Vote on who looks the worst. No cheating with filters."},
    {id:'t3',n:'Balance Walk', p:2,t:'winner',d:"Find something random on the ground and balance it on your head walking back down. Drop it, you're out. Last one with it wins."},
    {id:'t4a',n:'Freeze — Last Standing', p:2,t:'winner',d:"Someone yells freeze mid-movement. Everyone holds their pose. First person to move is out. The last one still frozen wins the points.",ct:30},
    {id:'t4b',n:'Best Pose',   p:1,t:'vote',  d:"Connected to Freeze above. While everyone is frozen, group votes on who struck the most unhinged / funniest pose. Separate point, same moment.",ct:30},
    {id:'t5',n:'Hot Take',     p:2,t:'vote',  d:"30 seconds each to give the worst opinion you can think of. Group votes on whoever said the most unhinged thing.",ct:30},
    {id:'t6',n:'Hill Roll',    p:3,t:'winner',d:"Everyone lines up at the top and rolls down the hill. First to the bottom wins. No stopping, no steering — just commit. Group decides if a roll was legit.",ct:60},
    {id:'t7',n:'Park Dare',    p:0,t:'dare',  d:"Last place after the Hill Race owes a dare right here, right now."},

var _ac=null;
function getAC(){
  if(!_ac){
    try{_ac=new(window.AudioContext||window.webkitAudioContext)();}catch(e){return null;}
  }
  if(_ac && _ac.state==='suspended'){
    try{_ac.resume();}catch(e){}
  }
  return _ac;
}
function unlockAudio(){
  var ac=getAC();
  if(ac && ac.state==='suspended'){
    ac.resume().then(function(){
      try{
        var buf=ac.createBuffer(1,1,22050);
        var src=ac.createBufferSource();
        src.buffer=buf;
        src.connect(ac.destination);
        src.start(0);
      }catch(e){}
    }).catch(function(){});
  }
  document.removeEventListener('touchstart',unlockAudio,true);
  document.removeEventListener('touchend',unlockAudio,true);
  document.removeEventListener('click',unlockAudio,true);
}
document.addEventListener('touchstart',unlockAudio,true);
document.addEventListener('touchend',unlockAudio,true);
document.addEventListener('click',unlockAudio,true);

function tone(f,t,d,v){
  if(muted)return;
  var a=getAC();if(!a)return;
  if(a.state==='suspended')return;
  try{
    var o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);
    o.type=t||'sine';o.frequency.value=f||440;
    g.gain.setValueAtTime(v||0.15,a.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+(d||0.12));
    o.start();o.stop(a.currentTime+(d||0.12));
  }catch(e){}
}
function toggleMute(){muted=!muted;var btn=document.getElementById('mute-btn');if(btn)btn.textContent=muted?'🔇':'🔊';showToast(muted?'Sound off':'Sound on');}

function mkPayload(){
  return{names:G.names,scores:G.scores,completed:G.completed,paidItems:G.paidItems,
    powerUsed:G.powerUsed,streaks:G.streaks,stopMVPs:G.stopMVPs,firedEvents:G.firedEvents,
    nextDouble:G.nextDouble,secretObjectives:G.secretObjectives,secretProgress:G.secretProgress,
    customExpenses:G.customExpenses||[],ts:G.ts};
}
function flashNavBadge(tab){var b=document.getElementById('badge-'+tab);if(!b)return;b.classList.add('show');setTimeout(function(){b.classList.remove('show');},3000);}
function applySync(d,src){
  if(!d||!d.ts||d.ts<=lastTs)return false;
  var prev=G.scores.slice();lastTs=d.ts;
  var keys=['names','scores','completed','paidItems','streaks','stopMVPs','firedEvents',
   'nextDouble','secretObjectives','secretProgress','customExpenses'];
  keys.forEach(function(k){if(d[k]!==undefined)G[k]=d[k];});
  if(d.powerUsed)G.powerUsed=Object.assign({duelUsed:false,doubleDown:false,doubleDownPi:-1,freePass:false},d.powerUsed);
  G.scores.forEach(function(sc,i){var was=getLv(prev[i]||0),now=getLv(sc);if(now.min>was.min)enqLvl(i,now);});
  save();render();renderHome();
  showToast('Synced'+(src?' from '+src:'')+'!');
  ['game','scores','budget','map'].forEach(function(t){if(t!==G.tab)flashNavBadge(t);});
  return true;
}
function syncPush(){G.ts=Date.now();save();if(!G.roomCode)return;try{localStorage.setItem('vbday_r_'+G.roomCode,JSON.stringify(mkPayload()));setLive(true);}catch(e){setLive(false);}}
function syncPull(){
  if(!G.roomCode)return;
  try{
    var raw=localStorage.getItem('vbday_r_'+G.roomCode);
    if(!raw)return;
    var d=JSON.parse(raw);
    if(d&&d.ts>lastTs)applySync(d,'room');
    setLive(true);
  }catch(e){setLive(false);}
}
function startSync(){if(syncTick)clearInterval(syncTick);syncTick=setInterval(syncPull,2500);}
function genCode(){return Math.random().toString(36).slice(2,8).toUpperCase();}

function getCode(){G.ts=Date.now();try{return btoa(unescape(encodeURIComponent(JSON.stringify(mkPayload()))));}catch(e){return null;}}
function applyCode(code){

    var d=JSON.parse(decodeURIComponent(escape(atob(code.trim()))));
    if(!d||!d.ts){showToast('Bad code');return;}
    if(d.ts<=G.ts){showToast('Already up to date');return;}
    applySync(d,'code');
  }catch(e){showToast('Invalid code');}
}

function assignSecrets(){

var pool=SECRETS.slice().sort(function(){return Math.random()-.5;});
G.secretObjectives=G.names.map(function(n,i){return{pi:i,objId:pool[i%pool.length].id,claimed:false};});
G.secretProgress={};
G.names.forEach(function(_,i){G.secretProgress[i]=0;});
save();
}
function getSecret(pi){
var s=G.secretObjectives.find(function(x){return x.pi===pi;});if(!s)return null;
return{obj:SECRETS.find(function(o){return o.id===s.objId;}),claimed:s.claimed};
}
function showSecret(pi){
var sec=getSecret(pi);if(!sec)return;
var obj=sec.obj;
var isMulti=G.mode===‘multi’;
var isLast=pi>=G.names.length-1;
var nextBtn;
if(isMulti){
nextBtn=’<button onclick="document.getElementById(\'ovl-secret\').classList.add(\'off\')" class="btn">Got it — it's MY secret 🤫</button>’;
}else if(isLast){
nextBtn=’<button onclick="document.getElementById(\'ovl-secret\').classList.add(\'off\')" class="btn">Everyone's got it — Let's go! 🌊</button>’;
}else{

function incSec(pi,delta){
var s=G.secretObjectives.find(function(x){return x.pi===pi;});if(!s||s.claimed)return;
var obj=SECRETS.find(function(o){return o.id===s.objId;});if(!obj)return;
var current=G.secretProgress[pi]||0;
if(delta>0&&current>=obj.target){showToast(‘Already at target — tap CLAIM!’);return;}
if(delta<0&&current<=0)return;
G.secretProgress[pi]=Math.min(obj.target,Math.max(0,current+delta));
var np=G.secretProgress[pi];
var atTarget=np>=obj.target;
var ctr=document.getElementById(‘sec-counter-’+pi);
if(ctr)ctr.textContent=np+’ / ‘+obj.target;
var st=document.getElementById(‘sec-status-’+pi);
if(st){
if(atTarget){st.textContent=‘Target hit!’;st.style.color=’#fbbf24’;}
else{st.textContent=np+’/’+obj.target;st.style.color=’#444’;}
}
var mb=document.getElementById(‘sec-minus-’+pi);
if(mb){mb.disabled=(np<=0);mb.style.opacity=(np<=0)?‘0.3’:‘1’;}
var pb=document.getElementById(‘sec-plus-’+pi);
if(pb){pb.disabled=atTarget;pb.style.opacity=atTarget?‘0.3’:‘1’;}
if(delta>0){vib([20,10,20]);sndSecProg();if(atTarget)showToast(G.names[pi]+’ hit the target! Claim in Scores 🎉’);}
syncPush();
}
function claimSec(pi){
var s=G.secretObjectives.find(function(x){return x.pi===pi;});if(!s||s.claimed){showToast(‘Already claimed’);return;}
var obj=SECRETS.find(function(o){return o.id===s.objId;});if(!obj)return;
var prog=G.secretProgress[pi]||0;
if(claimPending===pi){
claimPending=-1;
s.claimed=true;
var prev=G.scores[pi];G.scores[pi]+=obj.pts;
var was=getLv(prev),now=getLv(G.scores[pi]);if(now.min>was.min)enqLvl(pi,now);
confetti(32);sndAward();vib([50,30,50]);syncPush();render();
showToast(G.names[pi]+’ secret done! +’+obj.pts+’ pts 🤫’);
}else{
claimPending=pi;

?‘Only ‘+prog+’/’+obj.target+’ done. Tap CLAIM again if group agrees.’

/* ── EVENTS ──────────────────────────────────────────────────────── */
function checkEvent(){
var total=G.scores.reduce(function(a,b){return a+b;},0);
var thresholds=[5,12,20];
for(var ti=0;ti<thresholds.length;ti++){
var t=thresholds[ti];
var k=‘t’+t;
if(total>=t&&G.firedEvents.indexOf(k)===-1){
G.firedEvents.push(k);
var av=EVENTS.filter(function(e){return G.firedEvents.indexOf(e.id)===-1;});
if(!av.length)return;
var ev=av[Math.floor(Math.random()*av.length)];
G.firedEvents.push(ev.id);
if(ev.id===‘e3’)G.nextDouble=true;
save();
(function(e){setTimeout(function(){showEvent(e);},600);})(ev);
return;
}
}
}

function spinDare(cid,pi){
var inner=document.getElementById(‘dare-inner’);
document.getElementById(‘ovl-dare’).classList.remove(‘off’);
inner.innerHTML=’<div id="dw" style="font-size:72px">🎲</div><div style="font-size:14px;color:#444;margin-top:16px">Spinning…</div>’;
sndDrum();vib([20,10,20,10,40]);
var frame=0;
var wt=setInterval(function(){
frame++;
var el=document.getElementById(‘dw’);
if(el){el.textContent=WHEEL[frame%WHEEL.length];el.style.animation=‘wheel .15s ease-in-out’;}
},80);
setTimeout(function(){
clearInterval(wt);
dare=DARES[Math.floor(Math.random()*DARES.length)];
dareCtx=(cid!==undefined&&pi!==undefined)?{cid:cid,pi:pi}:null;
clearInterval(timerTick);timerSecs=dare.s||0;timerOn=false;
renderDare();
},500);
}
function renderDare(){
var cc=CAT[dare.c]||’#fff’,hasT=dare.s&&dare.s>0;
var who=dareCtx?G.names[dareCtx.pi]:null,isCB=dareCtx&&dareCtx.isComeback;
var rerollFn;
if(isCB) rerollFn=‘comebackDare(’+dareCtx.pi+’)’;
else if(dareCtx) rerollFn=“spinDare(’”+dareCtx.cid+”’,”+dareCtx.pi+’)’;
else rerollFn=‘spinDare()’;
var h=’<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">’;
h+=’<span style="font-size:10px;letter-spacing:2px;text-transform:uppercase;background:'+cc+'20;color:'+cc+';padding:3px 12px;border-radius:20px;font-weight:700">’+dare.c+(isCB?’ · HARD ONLY’:’’)+’</span>’;
h+=’<button onclick="'+rerollFn+'" style="background:none;border:1px solid #222;border-radius:8px;padding:4px 10px;color:#444;font-family:Courier New,monospace;font-size:11px;cursor:pointer">reroll 🎲</button></div>’;
if(who){
h+=’<div style="font-size:11px;color:#444;margin-bottom:10px">Dare for <strong style="color:'+cc+'">’+who+youB(dareCtx.pi)+’</strong>’;
h+=isCB?’ <span style="color:#f43f5e;font-weight:700">COMEBACK +2 pts</span>’:’<br><span style="font-size:10px">Complete = done · Bail = lose 1 pt</span>’;
h+=’</div>’;
}
h+=’<div style="font-size:10px;letter-spacing:3px;color:#444;margin-bottom:6px;text-transform:uppercase">DARE</div>’;
h+=’<div style="background:#0f0f0f;border:2px solid '+cc+';border-radius:14px;padding:20px;margin-bottom:16px"><p style="font-size:17px;font-weight:700;line-height:1.6;margin:0">’+dare.t+’</p></div>’;
if(hasT){
h+=’<div style="background:#222;border-radius:2px;height:3px;overflow:hidden;margin-bottom:10px"><div id="tfill" style="height:100%;background:'+cc+';width:100%;border-radius:2px;transition:width .95s linear"></div></div>’;
h+=’<div id="tdisp" style="font-size:28px;font-weight:900;color:'+cc+';text-align:center;margin-bottom:12px">’+fmt(timerSecs)+’</div>’;
h+=’<button id="tbtn" onclick="toggleTimer()" style="width:100%;padding:11px;background:'+cc+';color:#000;border:none;border-radius:8px;font-family:Courier New,monospace;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:10px">Start Timer</button>’;
}
h+=’<button onclick="doneWithDare(true,event)" class="btn" style="margin-bottom:8px">Done — mark complete</button>’;
h+=’<button onclick="doneWithDare(false,event)" style="width:100%;padding:12px;background:#f43f5e15;border:1px solid #f43f5e44;border-radius:10px;color:#f43f5e;font-family:Courier New,monospace;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:6px">Bailed — lose 1 pt</button>’;
if(!dareCtx)h+=’<button onclick="spinDare()" class="btn-ghost" style="width:100%;margin-top:4px">spin again</button>’;
document.getElementById(‘dare-inner’).innerHTML=h;

}
function toggleTimer(){
if(timerSecs<=0)return;timerOn=!timerOn;
var btn=document.getElementById(‘tbtn’);if(btn)btn.textContent=timerOn?‘Pause’:‘Resume’;
if(timerOn){
vib([20]);var total=dare.s;
timerTick=setInterval(function(){
timerSecs–;
var d2=document.getElementById(‘tdisp’),f=document.getElementById(‘tfill’);
if(d2)d2.textContent=timerSecs>0?fmt(timerSecs):“Time’s up!”;
if(f)f.style.width=((timerSecs/total)*100)+’%’;
if(timerSecs<=5&&timerSecs>0){sndTick();vib([15]);}
if(timerSecs<=0){
clearInterval(timerTick);timerOn=false;
if(d2)d2.style.color=’#4ade80’;
if(btn)btn.textContent=‘Done!’;
vib([60,30,60]);showToast(“Time’s up!”);
}
},1000);
}else clearInterval(timerTick);
}
function doneWithDare(completed,evt){
clearInterval(timerTick);timerOn=false;
if(dareCtx){
var pi=dareCtx.pi,cid=dareCtx.cid,isComeback=dareCtx.isComeback;
if(completed){
if(isComeback){
var prev=G.scores[pi];G.scores[pi]+=2;
var was=getLv(prev),now=getLv(G.scores[pi]);if(now.min>was.min)enqLvl(pi,now);
if(evt){var r=evt.target.getBoundingClientRect();ptAnim(2,r.left+r.width/2,r.top);}
showToast(G.names[pi]+’ comeback! +2 pts!’);checkEvent();markPending();
}else G.completed[cid]={pi:pi,time:Date.now()};
G.streaks[pi]=(G.streaks[pi]||0)+1;
G.dareHistory.push({pi:pi,dare:dare.t,completed:true,time:Date.now()});
sndAward();vib([40,20,40]);
if(G.streaks[pi]>=3)showToast(G.names[pi]+’ on a ‘+G.streaks[pi]+’-dare streak! 🔥’);
else if(!isComeback)showToast(G.names[pi]+’ dare done!’);
}else{
var lost=G.scores[pi]>0;if(lost)G.scores[pi]=Math.max(0,G.scores[pi]-1);
if(evt&&lost){var rb=evt.target.getBoundingClientRect();ptAnim(-1,rb.left+rb.width/2,rb.top);}
showToast(G.names[pi]+’ bailed’+(lost?’ — lost 1 pt’:’’));
G.streaks[pi]=0;
G.dareHistory.push({pi:pi,dare:dare.t,completed:false,time:Date.now()});
sndBail();vib([80]);
}
syncPush();render();
}else{if(!completed)showToast(‘Bail recorded’);}
dare=null;dareCtx=null;document.getElementById(‘ovl-dare’).classList.add(‘off’);
}

function renderGame(){

var total=G.scores.reduce(function(a,b){return a+b;},0);
var lb=document.getElementById(‘lead-banner’);
if(lb){

}

}

var tabHtml=’’;
STOPS.forEach(function(s,i){

tabHtml+=’</button>’;
});
var st=document.getElementById(‘stop-tabs’);if(st)st.innerHTML=tabHtml;

html+=’</div>’;
if(stop.time)html+=’<div style="text-align:right"><div style="font-size:11px;color:#444">’+stop.time+’</div></div>’;
html+=’</div>’;

stop.chs.forEach(function(c){

if(isLinkedB)card+=’<div style="font-size:9px;color:#4ade80;font-weight:700;letter-spacing:2px;margin-bottom:6px;text-transform:uppercase">↑ PART 2 OF 2 — SAME MOMENT</div>’;

if(isRunning)card+=’<span id="ct-incard-'+cid+'" style="font-size:10px;color:#fbbf24;font-weight:700;margin-left:auto">⏱ ‘+fmt(ctSecs)+’</span>’;
if(done)card+=’<span style="font-size:10px;color:#4ade80;margin-left:auto">✓ ‘+(winner>=0?G.names[winner]:‘done’)+’</span>’;

function renderScores(){
var sorted=G.names.map(function(n,i){return{n:n,s:G.scores[i],i:i};}).sort(function(a,b){return b.s-a.s;});
var html=’<div style="padding:18px 16px">’;
html+=’<div style="font-size:10px;letter-spacing:3px;color:#444;margin-bottom:16px;text-transform:uppercase">Leaderboard</div>’;

sorted.forEach(function(p,rank){
var lv=getLv(p.s);
var nxtLv=LEVELS.find(function(l){return l.min>p.s;});
var pct=nxtLv?Math.round((p.s/nxtLv.min)*100):100;
var sec=getSecret(p.i);
var prog=G.secretProgress[p.i]||0;
var secObj=sec?sec.obj:null;
var atTarget=secObj&&prog>=secObj.target;
var isClaimed=sec&&sec.claimed;
var powers=unlPow(p.i);
var dh=G.dareHistory.filter(function(d){return d.pi===p.i;});
var dComp=dh.filter(function(d){return d.completed;}).length;
var dBail=dh.filter(function(d){return !d.completed;}).length;

html+=’<div style="background:#0f0f0f;border:1px solid #222;border-radius:14px;padding:14px;margin-bottom:12px">’;
html+=’<div style="display:flex;align-items:center;gap:10px;margin-bottom:12px">’;
html+=’<div style="font-size:28px">’+lv.icon+’</div>’;
html+=’<div style="flex:1"><div style="font-size:16px;font-weight:900;color:'+lv.color+'">’+p.n+youB(p.i)+’</div>’;
html+=’<div style="font-size:11px;color:#444">’+lv.name+(G.streaks[p.i]>=2?’ · 🔥 ‘+G.streaks[p.i]+’ streak’:’’)+’</div></div>’;
html+=’<div style="text-align:right"><div style="font-size:26px;font-weight:900;color:'+lv.color+'">’+p.s+’</div>’;
if(MEDALS[rank])html+=’<div style="font-size:14px">’+MEDALS[rank]+’</div>’;
html+=’</div></div>’;
html+=’<div style="margin-bottom:10px"><div class="prog-bar-wrap" style="margin-bottom:4px"><div class="prog-bar-fill" style="width:'+pct+'%;background:'+lv.color+'"></div></div>’;
html+=’<div style="font-size:10px;color:#444">’+(nxtLv?p.s+’/’+nxtLv.min+’ → ‘+nxtLv.icon+’ ‘+nxtLv.name:‘MAX LEVEL 👑’)+’</div></div>’;
if(dh.length>0){
html+=’<div style="display:flex;gap:6px;margin-bottom:10px"><span class="stat-pill">🎲 ‘+dComp+’ done</span>’;
if(dBail>0)html+=’<span class="stat-pill">💨 ‘+dBail+’ bailed</span>’;
html+=’</div>’;
}
if(secObj){
html+=’<div style="background:#161616;border:1px dashed #a78bfa44;border-radius:10px;padding:10px 12px;margin-bottom:10px">’;
html+=’<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">’;
html+=’<span style="font-size:10px;color:#a78bfa;font-weight:700;text-transform:uppercase;letter-spacing:1px">🤫 Secret</span>’;
if(isClaimed)html+=’<span style="font-size:10px;color:#4ade80;font-weight:700">Claimed ✓</span>’;
else if(atTarget)html+=’<span id="sec-status-'+p.i+'" style="font-size:10px;color:#fbbf24;font-weight:700">Target hit!</span>’;
else html+=’<span id="sec-status-'+p.i+'" style="font-size:10px;color:#444">’+prog+’/’+secObj.target+’</span>’;
html+=’</div>’;
if(G.mode===‘single’||G.myPlayer===p.i){
html+=’<div style="font-size:11px;color:#888;line-height:1.5;margin-bottom:8px">’+secObj.t+’</div>’;
if(!isClaimed){
html+=’<div style="display:flex;gap:6px">’;
html+=’<button id=“sec-minus-’+p.i+’” onclick=“incSec(’+p.i+’,-1)” ‘+(prog<=0?‘disabled’:’’)+’ style=“background:#222;border:none;border-radius:6px;padding:4px 12px;color:#f0f0f0;font-family:Courier New,monospace;font-size:16px;cursor:pointer;opacity:’+(prog<=0?‘0.3’:‘1’)+’”>−</button>’;

html+=’<button id=“sec-plus-’+p.i+’” onclick=“incSec(’+p.i+’,1)” ‘+(atTarget?‘disabled’:’’)+’ style=“background:#222;border:none;border-radius:6px;padding:4px 12px;color:#f0f0f0;font-family:Courier New,monospace;font-size:16px;cursor:pointer;opacity:’+(atTarget?‘0.3’:‘1’)+’”>+</button>’;
html+=’</div>’;
html+=’<button onclick="claimSec('+p.i+')" style="width:100%;margin-top:8px;padding:8px;background:#a78bfa15;border:1px solid #a78bfa44;border-radius:8px;color:#a78bfa;font-family:Courier New,monospace;font-size:11px;font-weight:700;cursor:pointer">CLAIM +’+secObj.pts+’ pts</button>’;
}
}else{

}
html+=’</div>’;
}
if(powers.length>0){
powers.filter(function(pw){return pw.power;}).forEach(function(pw){
var used=pwU(pw.id);
html+=’<button onclick="triggerPower('+p.i+',\''+pw.id+'\')" style="width:100%;margin-bottom:6px;padding:10px;background:'+(used?'#222':pw.color+'15')+';border:1px solid '+(used?'#222':pw.color+'44')+';border-radius:10px;color:'+(used?'#444':pw.color)+';font-family:Courier New,monospace;font-size:11px;font-weight:700;cursor:pointer;text-align:left;opacity:'+(used?.5:1)+'">’+pw.icon+’ ‘+pw.name+(used?’ (used)’:’’)+’ <span style="font-weight:400;font-size:10px;display:block;margin-top:2px">’+pw.power+’</span></button>’;
});
}
html+=’</div>’;
});

var mvpStops=Object.keys(G.stopMVPs);
if(mvpStops.length>0){
html+=’<div style="background:#0f0f0f;border:1px solid #fbbf2433;border-radius:14px;padding:14px;margin-bottom:12px">’;
html+=’<div style="font-size:10px;letter-spacing:3px;color:#fbbf24;margin-bottom:10px;text-transform:uppercase">Stop MVPs 🏅</div>’;
mvpStops.forEach(function(sid){

});
html+=’</div>’;
}
html+=’</div>’;
document.getElementById(‘s-scores’).innerHTML=html;
}

/* ── INIT ────────────────────────────────────────────────────────── */
function init(){
try{load();}catch(e){console.error(‘Load err:’,e);}
try{
renderHome();
}catch(e){
console.error(‘RenderHome err:’,e);
document.getElementById(‘s-home’).innerHTML=
‘<div style="padding:40px 20px;text-align:center;font-family:Courier New,monospace">’
+’<div style="font-size:36px;margin-bottom:12px">🌊</div>’
+’<div style="font-size:14px;font-weight:900;margin-bottom:8px;color:#f0f0f0">VB Day Game</div>’
+’<div style="font-size:12px;color:#f43f5e;margin-bottom:20px">Something went wrong loading — tap to reset</div>’
+’<button onclick="doReset();location.reload()" style="width:100%;padding:14px;background:#f0f0f0;color:#000;border:none;border-radius:12px;font-family:Courier New,monospace;font-size:14px;font-weight:900;cursor:pointer">Reset & Reload</button>’
+’</div>’;
}
if(G.roomCode){try{startSync();}catch(e){}}
setTimeout(function(){
var h=document.getElementById(‘s-home’);
if(h&&h.innerHTML.indexOf(‘Loading VB Day’)>=0){
try{renderHome();}catch(e){
h.innerHTML=’<div style="padding:40px 20px;text-align:center;font-family:Courier New,monospace"><div style="font-size:36px;margin-bottom:12px">🌊</div><div style="font-size:14px;font-weight:900;color:#f0f0f0;margin-bottom:12px">VB Day Game</div><button onclick="startDay()" style="width:100%;padding:14px;background:#f0f0f0;color:#000;border:none;border-radius:12px;font-family:Courier New,monospace;font-size:14px;font-weight:900;cursor:pointer">Start →</button></div>’;
}
}
},1500);
}
window.addEventListener(‘error’,function(e){
console.error(‘Global error:’,e.message);
});
if(document.readyState===‘loading’){
document.addEventListener(‘DOMContentLoaded’,init);
}else{
init();
}
</script>
